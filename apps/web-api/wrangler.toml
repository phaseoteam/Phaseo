name = "phaseo-web-api"
main = "src/index.ts"
compatibility_date = "2026-05-28"
workers_dev = false
preview_urls = false

# Workers Cache is checked before this Worker executes. Public responses opt in
# through their Cache-Control headers; account routes remain private/no-store.
[cache]
enabled = true

[vars]
ENV = "production"

# PR previews deploy this separately named Worker to the account's workers.dev
# subdomain. It deliberately has no phaseo.app route, so it cannot intercept
# production traffic.
[env.staging]
workers_dev = true
preview_urls = true
routes = []

[env.staging.vars]
ENV = "staging"

# The web-data boundary is deliberately narrow: Vercel continues to own
# phaseo.app/api/* while Cloudflare owns only the frontend data namespace.
[[routes]]
pattern = "phaseo.app/api/_web/*"
zone_name = "phaseo.app"

[observability]
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
