    ResponsesWebSocketCreateEvent:
      type: object
      description: >
        Client message for websocket turn creation. Gateway performs lightweight
        validation (`type` and `model` format) before forwarding to OpenAI;
        deeper request-shape validation is enforced by upstream.
      required:
        - type
        - model
      properties:
        type:
          type: string
          enum:
            - response.create
        model:
          type: string
          description: |
            OpenAI model id in provider/model format: `openai/<model>`.
        previous_response_id:
          type: string
          nullable: true
        input:
          description: New input items for this turn.
          oneOf:
            - type: string
            - type: array
              items:
                type: object
            - type: object
        tools:
          type: array
          items:
            type: object
        tool_choice:
          oneOf:
            - type: string
            - type: object
        store:
          type: boolean
          description: Ignored by gateway. Always forced to false on this endpoint.
      additionalProperties: true
    ResponsesWebSocketServerEvent:
      type: object
      description: >
        Streamed websocket event. Mirrors OpenAI Responses event payloads (for
        example `response.created`, `response.output_text.delta`,
        `response.completed`, or `error`).
      properties:
        type:
          type: string
        response:
          type: object
        error:
          type: object
        status:
          type: integer
      additionalProperties: true
