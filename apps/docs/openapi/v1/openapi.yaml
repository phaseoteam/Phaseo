      type: object
      properties:
        error:
          type: object
          properties:
            type:
              type: string
              example: invalid_request_error
            code:
              type: string
              example: websocket_upgrade_required
            message:
              type: string
              example: Use WebSocket upgrade for /v1/responses/ws.
