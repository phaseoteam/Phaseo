tags:
  - name: Gateway
    description: Core AI Stats Gateway operations.
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication
  schemas:
    ProviderRoutingOptions:
      type: object
      description: Provider routing preferences for gateway selection.
      properties:
        order:
          type: array
          items:
            type: string
        only:
          type: array
          items:
            type: string
        ignore:
          type: array
          items:
            type: string
        include_alpha:
          type: boolean
          description: Include alpha providers in routing (off by default).
    DebugOptions:
      type: object
      description: Gateway debug controls. These flags are never forwarded upstream.
      properties:
        enabled:
          type: boolean
        return_upstream_request:
          type: boolean
        return_upstream_response:
          type: boolean
        trace:
          type: boolean
        trace_level:
          type: string
          enum:
            - summary
            - full
    CacheControl:
      type: object
      properties:
        type:
          type: string
        ttl:
          type: string
        scope:
          type: string
      additionalProperties: true
    ProviderOptions:
      type: object
      description: Optional provider-specific options.
      properties:
        openai:
          type: object
          properties:
            context_management:
              type: object
              description: Optional OpenAI context management configuration.
              properties:
                type:
                  type: string
                  enum:
                    - compaction
                compact_threshold:
                  type: number
              required:
                - type
            prompt_cache_retention:
              type: string
        anthropic:
          type: object
          properties:
            cache_control:
              $ref: '#/components/schemas/CacheControl'
        google:
          type: object
          properties:
            cache_control:
              $ref: '#/components/schemas/CacheControl'
            cached_content:
              type: string
            cache_ttl:
              type: string
    Provider:
      type: object
      properties:
        api_provider_id:
          type: string
          example: openai
        api_provider_name:
          type: string
          nullable: true
          example: OpenAI
        description:
          type: string
          nullable: true
        link:
          type: string
          nullable: true
          example: https://openai.com
        country_code:
          type: string
          nullable: true
          example: US
    Model:
      type: object
      properties:
        id:
          type: string
        canonical_slug:
          type: string
        model_id:
          type: string
        name:
          type: string
          nullable: true
        description:
          type: string
        created:
          type: integer
          nullable: true
        release_date:
          type: string
          nullable: true
        deprecation_date:
          type: string
          nullable: true
        retirement_date:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        availability:
          $ref: '#/components/schemas/ModelAvailability'
        lifecycle:
          $ref: '#/components/schemas/ModelLifecycle'
        organisation_id:
          type: string
          nullable: true
        organisation_name:
          type: string
          nullable: true
        organisation_colour:
          type: string
          nullable: true
        aliases:
          type: array
          items:
            type: string
        endpoints:
          type: array
          items:
            type: string
        input_types:
          type: array
          items:
            type: string
        output_types:
          type: array
          items:
            type: string
        providers:
          type: array
          items:
            $ref: '#/components/schemas/ModelProviderAvailability'
        supported_params:
          type: array
          items:
            type: string
        supported_parameters:
          type: array
          items:
            type: string
        architecture:
          type: object
          properties:
            modality:
              type: string
            input_modalities:
              type: array
              items:
                type: string
            output_modalities:
              type: array
              items:
                type: string
            tokenizer:
              type: string
              nullable: true
            instruct_type:
              type: string
              nullable: true
        top_provider_id:
          type: string
          nullable: true
        top_provider:
          type: object
          properties:
            context_length:
              type: integer
              nullable: true
            max_completion_tokens:
              type: integer
              nullable: true
            is_moderated:
              type: boolean
        pricing:
          type: object
          properties:
            prompt:
              type: string
              nullable: true
            completion:
              type: string
              nullable: true
            request:
              type: string
              nullable: true
            image:
              type: string
              nullable: true
            input_cache_read:
              type: string
              nullable: true
            input_cache_write:
              type: string
              nullable: true
            web_search:
              type: string
              nullable: true
        pricing_detail:
          type: object
          properties:
            pricing_plan:
              type: string
            meters:
              type: object
              additionalProperties: true
        per_request_limits:
          type: object
          nullable: true
          additionalProperties: true
    ModelLifecycle:
      type: object
      properties:
        status:
          type: string
          enum:
            - active
            - deprecated
            - retired
          nullable: true
        deprecation_date:
          type: string
          nullable: true
        retirement_date:
          type: string
          nullable: true
        replacement_model_id:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
    ModelAvailability:
      type: object
      required:
        - status
        - provider_count
        - active_provider_count
        - inactive_provider_count
      properties:
        status:
          type: string
          enum:
            - active
            - coming_soon
            - inactive
            - not_listed
        provider_count:
          type: integer
          minimum: 0
        active_provider_count:
          type: integer
          minimum: 0
        inactive_provider_count:
          type: integer
          minimum: 0
    ModelProviderAvailability:
      type: object
      required:
        - api_provider_id
        - is_active_gateway
        - availability_status
        - availability_reason
        - provider_status
        - provider_routing_status
        - model_routing_status
        - capability_status
        - endpoints
        - params
      properties:
        api_provider_id:
          type: string
        api_provider_name:
          type: string
          nullable: true
        is_active_gateway:
          type: boolean
        availability_status:
          type: string
          enum:
            - active
            - coming_soon
            - inactive
        availability_reason:
          type: string
          enum:
            - active
            - preview_only
            - gated
            - access_limited
            - region_limited
            - project_limited
            - paused
            - soft_blocked
            - deranked_lvl1
            - deranked_lvl2
            - deranked_lvl3
            - internal_testing
            - scheduled
            - coming_soon
            - provider_disabled
            - model_disabled
            - capability_disabled
            - provider_not_ready
            - provider_inactive
            - inactive
            - retired
        provider_status:
          type: string
          enum:
            - active
            - beta
            - alpha
            - not_ready
            - gated
            - access_limited
            - region_limited
            - project_limited
            - paused
            - soft_blocked
        provider_routing_status:
          type: string
          enum:
            - active
            - deranked_lvl1
            - deranked_lvl2
            - deranked_lvl3
            - disabled
        model_routing_status:
          type: string
          enum:
            - active
            - deranked_lvl1
            - deranked_lvl2
            - deranked_lvl3
            - disabled
        capability_status:
          type: string
          enum:
            - active
            - coming_soon
            - deranked_lvl1
            - deranked_lvl2
            - deranked_lvl3
            - disabled
            - internal_testing
        effective_from:
          type: string
          nullable: true
        effective_to:
          type: string
          nullable: true
        endpoints:
          type: array
          items:
            type: string
        params:
          type: array
          items:
            type: string
    DataModelOrganisation:
      type: object
      nullable: true
      properties:
        organisation_id:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        country_code:
          type: string
          nullable: true
        colour:
          type: string
          nullable: true
    DataModel:
      type: object
      properties:
        model_id:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        release_date:
          type: string
          nullable: true
        deprecation_date:
          type: string
          nullable: true
        retirement_date:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        lifecycle:
          $ref: '#/components/schemas/ModelLifecycle'
        hidden:
          type: boolean
        input_types:
          type: array
          items:
            type: string
        output_types:
          type: array
          items:
            type: string
        organisation:
          $ref: '#/components/schemas/DataModelOrganisation'
    ChatCompletionsRequest:
      type: object
      required:
        - model
        - messages
      properties:
        model:
          type: string
        messages:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ChatMessage'
        reasoning:
          $ref: '#/components/schemas/ReasoningConfig'
        frequency_penalty:
          type: number
          minimum: -2
          maximum: 2
        logit_bias:
          type: object
          additionalProperties:
            type: number
        max_completion_tokens:
          type: integer
          minimum: 1
        max_tokens:
          type: integer
          minimum: 1
        metadata:
          type: object
          additionalProperties:
            type: string
        session_id:
          type: string
          maxLength: 256
          description: >-
            Unique identifier for grouping related requests (for example, a
            conversation or agent workflow) for observability.
        presence_penalty:
          type: number
          minimum: -2
          maximum: 2
        seed:
          type: integer
          minimum: -9223372036854776000
          maximum: 9223372036854776000
        store:
          type: boolean
        stream:
          type: boolean
          default: false
        stream_options:
          type: object
        temperature:
          type: number
          minimum: 0
          maximum: 2
          default: 1
        tools:
          type: array
          description: >
            Tool definitions for model function calls and gateway server tools.
            The only built-in gateway server tool is `gateway:datetime`.
            Web-search tool types (for example `web_search_preview`) are
            temporarily disabled by the gateway.
          items:
            $ref: '#/components/schemas/TextGenerateTool'
        max_tool_calls:
          type: integer
          minimum: 1
        parallel_tool_calls:
          type: boolean
          default: true
        tool_choice:
          $ref: '#/components/schemas/TextToolChoice'
        logprobs:
          type: boolean
          default: false
        top_logprobs:
          type: integer
          minimum: 0
          maximum: 20
        top_p:
          type: number
          minimum: 0
          maximum: 1
        stop:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        response_format:
          oneOf:
            - type: string
            - type: object
              properties:
                type:
                  type: string
                schema:
                  type: object
        modalities:
          type: array
          items:
            type: string
            enum:
              - text
              - image
              - audio
        image_config:
          $ref: '#/components/schemas/ImageConfig'
        usage:
          type: boolean
        provider:
          $ref: '#/components/schemas/ProviderRoutingOptions'
        provider_options:
          $ref: '#/components/schemas/ProviderOptions'
        user_id:
          type: string
        user:
          type: string
        service_tier:
          type: string
          enum:
            - auto
            - default
            - flex
            - standard
            - priority
        prompt_cache_key:
          type: string
          nullable: true
        safety_identifier:
          type: string
          nullable: true
        meta:
          type: boolean
          default: false
        echo_upstream_request:
          type: boolean
        debug:
          $ref: '#/components/schemas/DebugOptions'
    ChatMessage:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum:
            - system
            - developer
            - user
            - assistant
            - tool
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/MessageContentPart'
        name:
          type: string
        tool_calls:
          type: array
          items:
            $ref: '#/components/schemas/ToolCall'
        images:
          type: array
          items:
            $ref: '#/components/schemas/ChatImageOutputPart'
        audios:
          type: array
          items:
            $ref: '#/components/schemas/ChatAudioOutputPart'
        tool_call_id:
          type: string
      discriminator:
        propertyName: role
    MessageContentPart:
      oneOf:
        - $ref: '#/components/schemas/TextContentPart'
        - $ref: '#/components/schemas/ImageContentPart'
        - $ref: '#/components/schemas/AudioContentPart'
        - $ref: '#/components/schemas/VideoContentPart'
        - $ref: '#/components/schemas/ToolCallContentPart'
    TextContentPart:
      type: object
      required:
        - type
        - text
      properties:
        type:
          type: string
          enum:
            - text
        text:
          type: string
    ImageContentPart:
      type: object
      required:
        - type
        - image_url
      properties:
        type:
          type: string
          enum:
            - image_url
        image_url:
          type: object
          properties:
            url:
              type: string
              description: HTTP(S) URL or data URI.
