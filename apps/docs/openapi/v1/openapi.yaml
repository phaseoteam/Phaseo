          schema:
            type: boolean
            default: false
        - name: status
          in: query
          description: Filter by model status
          schema:
            type: array
            items:
              type: string
        - name: organisation
          in: query
          description: Filter by organisation
          schema:
            oneOf:
              - $ref: '#/components/schemas/OrganisationId'
              - type: array
                items:
                  $ref: '#/components/schemas/OrganisationId'
        - name: model_id
          in: query
          description: Filter by model id
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - name: id
          in: query
          description: Alias for model_id filter
          schema:
            oneOf:
              - type: string
              - type: array
