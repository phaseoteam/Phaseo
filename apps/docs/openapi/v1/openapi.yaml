          type: string
          example: Human-readable error message
    RealtimeNotImplementedResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            type:
              type: string
              example: not_implemented
            message:
              type: string
              example: realtime is not implemented yet
    NotImplementedResponse:
      type: object
      description: >-
        Placeholder response for endpoints that are routed but not implemented
        yet.
      properties:
        status_code:
          type: integer
          example: 501
        error:
          type: string
          example: not_implemented
        description:
          type: string
          example: Endpoint is not implemented yet.
      additionalProperties: true
    ActivityEntry:
      type: object
      properties:
        request_id:
          type: string
          example: req_abc123
        provider:
          type: string
          example: openai
        model:
          type: string
          example: gpt-4o
        endpoint:
          type: string
          example: chat.completions
        usage:
          type: object
          properties:
            input_tokens:
              type: integer
            output_tokens:
              type: integer
            total_tokens:
              type: integer
        cost_cents:
          type: number
          example: 0.015
        latency_ms:
          type: integer
          example: 450
        timestamp:
          type: string
          format: date-time
          example: '2026-01-20T10:30:00Z'
    ProvisioningKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 11111111-1111-4111-8111-111111111111
        name:
          type: string
          example: Production Key
        prefix:
          type: string
          example: pk_abc123
        status:
          type: string
          enum:
            - active
            - disabled
            - revoked
          example: active
        scopes:
          type: string
