    ErrorResponse:
      type: object
      required:
        - error
      properties:
        ok:
          type: boolean
          example: false
        error:
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
          example: error_type
        message:
          type: string
          example: Human-readable error message
        description:
          type: string
          example: Additional error details.
      additionalProperties: true
    HealthCheckResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
      additionalProperties: false
    GatewayModelsResponse:
      type: object
      required:
        - ok
        - privacy_scope
        - limit
        - offset
        - total
        - models
      properties:
        ok:
          type: boolean
          example: true
        privacy_scope:
          type: string
          enum:
            - shared
            - team
          example: shared
        limit:
          type: integer
          minimum: 1
          maximum: 250
          example: 50
        offset:
          type: integer
          minimum: 0
          maximum: 5000
          example: 0
        total:
          type: integer
          minimum: 0
          example: 128
        models:
          type: array
          items:
            $ref: '#/components/schemas/Model'
      additionalProperties: false
    InvalidRequestResponse:
      type: object
      required:
        - ok
        - error
        - message
      properties:
        ok:
          type: boolean
          enum:
            - false
          example: false
        error:
          type: string
          example: invalid_request
        message:
          type: string
          example: Invalid request parameters.
        max_offset:
          type: integer
          minimum: 0
      additionalProperties: true
    ModelsPrivacyScopeNotImplementedResponse:
      type: object
      required:
        - ok
        - error
        - code
        - message
        - privacy_scope
      properties:
        ok:
          type: boolean
          enum:
            - false
          example: false
        error:
          type: string
          enum:
            - not_implemented
          example: not_implemented
        code:
          type: string
          enum:
            - models_privacy_scope_not_implemented
        message:
          type: string
        privacy_scope:
          type: string
          enum:
            - team
      additionalProperties: true
    AnalyticsNotImplementedResponse:
      type: object
      required:
        - ok
        - status
        - message
      properties:
        ok:
          type: boolean
          enum:
            - true
          example: true
        status:
          type: string
          enum:
            - not_implemented
          example: not_implemented
        message:
          type: string
          example: Analytics aggregation coming soon
      additionalProperties: false
    AnalyticsAccessTokenRequiredResponse:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          enum:
            - false
          example: false
        error:
          type: string
          enum:
            - access_token_required
          example: access_token_required
      additionalProperties: false
    RealtimeNotImplementedResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - type
            - message
          properties:
            type:
              type: string
              example: not_implemented
            message:
              type: string
              example: realtime is not implemented yet
          additionalProperties: false
      additionalProperties: false
    NotImplementedResponse:
      type: object
      description: >-
        Placeholder response for endpoints that are routed but not implemented
        yet.
      required:
        - status_code
        - error
        - description
      properties:
        status_code:
          type: integer
          example: 501
        error:
          type: string
          example: not_implemented
        description:
          type: string
          example: Endpoint is not implemented yet.
      additionalProperties: true
    ActivityResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ActivityEntry'
      additionalProperties: false
    ActivityEntry:
      type: object
      required:
        - date
        - model
        - model_permaslug
        - endpoint_id
        - provider_name
        - usage
        - byok_usage_inference
        - requests
        - prompt_tokens
        - completion_tokens
        - reasoning_tokens
      properties:
        date:
          type: string
          format: date
          example: '2025-08-24'
        model:
          type: string
          example: openai/gpt-4.1
        model_permaslug:
          type: string
          example: openai/gpt-4.1-2025-04-14
        endpoint_id:
          type: string
          example: chat.completions
        provider_name:
          type: string
          example: OpenAI
        usage:
          type: number
          example: 0.015
        byok_usage_inference:
          type: number
          example: 0.012
        requests:
          type: integer
          example: 5
        prompt_tokens:
          type: integer
          example: 50
        completion_tokens:
          type: integer
          example: 125
        reasoning_tokens:
          type: integer
          example: 25
      additionalProperties: false
    ProvisioningKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 11111111-1111-4111-8111-111111111111
        name:
          type: string
          example: Production Key
        prefix:
          type: string
          example: pk_abc123
        status:
          type: string
          enum:
            - active
            - disabled
            - revoked
          example: active
        scopes:
          type: string
          example: read,write
        created_at:
          type: string
          format: date-time
          example: '2026-01-01T00:00:00Z'
        last_used_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-01-20T10:30:00Z'
    ProvisioningKeyWithValue:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 11111111-1111-4111-8111-111111111111
        name:
          type: string
          example: My New Key
        prefix:
          type: string
          example: pk_abc123xy
        status:
          type: string
          enum:
            - active
            - disabled
            - revoked
          example: active
        scopes:
          type: string
          example: read,write
        created_at:
          type: string
          format: date-time
          example: '2026-01-20T10:30:00Z'
        key:
          type: string
          description: The raw management API key. Only returned on creation.
          example: pk_abc123xy_abc123def456...
    ProvisioningKeyDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 11111111-1111-4111-8111-111111111111
        team_id:
          type: string
          format: uuid
          example: 22222222-2222-4222-8222-222222222222
        name:
          type: string
          example: Production Key
        prefix:
          type: string
          example: pk_abc123
        status:
          type: string
          enum:
            - active
            - disabled
            - revoked
          example: active
        scopes:
          type: string
          example: read,write
        created_by:
          type: string
          format: uuid
          example: 33333333-3333-4333-8333-333333333333
        created_at:
          type: string
          format: date-time
          example: '2026-01-01T00:00:00Z'
        last_used_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-01-20T10:30:00Z'
        soft_blocked:
          type: boolean
          example: false
    ManagementKeyCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name for the key.
        team_id:
          type: string
          description: Team scope for internal callers.
        created_by:
          type: string
          description: Creator user ID for internal callers.
        scopes:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        status:
          type: string
          enum:
            - active
            - disabled
            - revoked
        soft_blocked:
          type: boolean
      additionalProperties: false
    ManagementKeyUpdateRequest:
      type: object
      properties:
        name:
          type: string
          description: New name for the key
        status:
          type: string
          enum:
            - active
            - disabled
            - revoked
          description: New status for the key
        soft_blocked:
          type: boolean
          description: Whether to temporarily block the key
      additionalProperties: false
    ManagementKeyListResponse:
      type: object
      required:
        - ok
        - limit
        - offset
        - total
        - keys
      properties:
        ok:
          type: boolean
          enum:
            - true
