name = "phaseo-gateway"
main = "src/index.ts"
compatibility_date = "2025-10-01"
compatibility_flags = ["global_fetch_strictly_public"]
workers_dev = false
preview_urls = false

[vars]
ENV = "prod"
SUPABASE_URL = "https://xansbgjaduxypzsmjwct.supabase.co"
MODEL_DISCOVERY_ENABLED = "true"
MODEL_DISCOVERY_RETENTION_DAYS = "7"
MODEL_DISCOVERY_SHARD_SIZE = "20"
VIDEO_RECONCILIATION_ENABLED = "true"
VIDEO_RECONCILIATION_LIMIT = "1000"
VIDEO_RECONCILIATION_CONCURRENCY = "24"
VIDEO_RECONCILIATION_LEASE_SECONDS = "180"
BATCH_RECONCILIATION_ENABLED = "true"
BATCH_RECONCILIATION_LIMIT = "500"
BATCH_RECONCILIATION_CONCURRENCY = "12"
BATCH_RECONCILIATION_LEASE_SECONDS = "300"
STATSIG_BATCH_API_GATE = "gateway_batch_api"
ASYNC_WEBHOOK_SECRET_ENCRYPTION_KEY_VERSION = "v1"
STATSIG_ENVIRONMENT_TIER = "production"
EMAIL_OUTBOX_DRAIN_ENABLED = "true"
EMAIL_OUTBOX_DRAIN_LIMIT = "25"
VIDEO_API_ENABLED = "true"
PRICING_MONITOR_ENABLED = "true"
ENTERPRISE_INVOICING_ENABLED = "true"
GATEWAY_PUBLIC_BASE_URL = "https://api.phaseo.app"

# PR previews deploy a distinct Worker on workers.dev. It must not inherit the
# custom domain, scheduler, or cache namespace used by the production gateway.
[env.staging]
workers_dev = true
preview_urls = true
routes = []

[env.staging.vars]
ENV = "staging"
SUPABASE_URL = "https://xansbgjaduxypzsmjwct.supabase.co"
MODEL_DISCOVERY_RETENTION_DAYS = "7"
MODEL_DISCOVERY_SHARD_SIZE = "15"
MODEL_DISCOVERY_ISSUE_SYNC_ENABLED = "false"
VIDEO_RECONCILIATION_ENABLED = "false"
VIDEO_RECONCILIATION_LIMIT = "100"
EMAIL_OUTBOX_DRAIN_ENABLED = "false"
EMAIL_OUTBOX_DRAIN_LIMIT = "25"
VIDEO_API_ENABLED = "true"
PRICING_MONITOR_ENABLED = "false"
ENTERPRISE_INVOICING_ENABLED = "false"
GATEWAY_PUBLIC_BASE_URL = "https://phaseo-gateway-staging.danielbutler500.workers.dev"

[env.staging.triggers]
crons = []

[[env.staging.kv_namespaces]]
binding = "GATEWAY_CACHE"
id = "4ffdeda1a87c45b38c697f78232526be"

[triggers]
crons = ["* * * * *"]

[placement]
mode = "smart"

[[routes]]
pattern = "api.phaseo.app"
custom_domain = true

[observability]
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[[kv_namespaces]]
binding = "GATEWAY_CACHE"
id = "f5e23068fcd94125ad9860c817c543d9"
preview_id = "f5e23068fcd94125ad9860c817c543d9"

# Native per-location Workers rate limiting. Application-level device polling
# checks remain authoritative because these counters are intentionally approximate.
[[ratelimits]]
name = "OAUTH_STRICT_RATE_LIMITER"
namespace_id = "41001"

[ratelimits.simple]
limit = 10
period = 60

[[ratelimits]]
name = "OAUTH_TOKEN_RATE_LIMITER"
namespace_id = "41002"

[ratelimits.simple]
limit = 60
period = 60
