<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI Stats Announcements</title>
  <desc id="desc">Gradient grid background with welcome text for announcements.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1" />
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <g fill="#ffffff">
    <text x="96" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="700">
      AI Stats Announcements
    </text>
    <text x="96" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="32" opacity="0.9">
      Local MDX posts with images and React components
    </text>
  </g>
</svg>
