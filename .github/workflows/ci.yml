name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

env:
    NODE_VERSION: 22

jobs:
    data:
        name: Validate data
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.18.3
                  run_install: false
                  standalone: true
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  registry-url: https://registry.npmjs.org
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Normalize pnpm lockfile line endings
              run: sed -i 's/\\r$//' pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate data files
              run: pnpm run validate:data && pnpm run validate:pricing && pnpm run validate:gateway

    check-paths:
        name: Check for data changes
        runs-on: ubuntu-latest
        if: github.event_name == 'push'
        outputs:
            data-changed: ${{ steps.filter.outputs.data }}
        steps:
            - uses: actions/checkout@v6

            - uses: dorny/paths-filter@v4
              id: filter
              with:
                  filters: |
                      data: 'packages/data/catalog/src/data/**'

    openapi-lint:
        name: OpenAPI lint
        runs-on: ubuntu-latest
        needs: data
        if: github.event_name == 'push' || !startsWith(github.head_ref, 'chore/auto-model-statuses')
        steps:
            - uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.18.3
                  run_install: false
                  standalone: true
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  registry-url: https://registry.npmjs.org
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Normalize pnpm lockfile line endings
              run: sed -i 's/\\r$//' pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate SDK version literals
              run: pnpm run sdk:check-version-literals

            - name: Sync OpenAPI enums from manifest
              run: pnpm run openapi:sync-enums

            - name: Lint OpenAPI spec
              run: pnpm run openapi:lint

            - name: Ensure OpenAPI enum sync is committed
              run: |
                  if ! git diff --ignore-cr-at-eol --ignore-space-at-eol --quiet apps/docs/openapi/v1/openapi.yaml; then
                    echo "::error::OpenAPI enums are out of sync with manifest data."
                    echo "::error::Run 'pnpm run openapi:sync-enums' and commit apps/docs/openapi/v1/openapi.yaml."
                    git diff apps/docs/openapi/v1/openapi.yaml
                    exit 1
                  fi

    apps:
        name: Apps ${{ matrix.app }}
        runs-on: ubuntu-latest
        needs: openapi-lint
        if: github.event_name == 'push' || !startsWith(github.head_ref, 'chore/auto-model-statuses')
        strategy:
            matrix:
                app: [api, docs, web]
        steps:
            - uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.18.3
                  run_install: false
                  standalone: true
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Normalize pnpm lockfile line endings
              run: sed -i 's/\\r$//' pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: API lint & build
              if: matrix.app == 'api'
              run: |
                  pnpm run validate:api
                  cd apps/api && pnpm exec tsx scripts/pricing-simulator-cli.ts

            - name: Docs links
              if: matrix.app == 'docs'
              continue-on-error: true
              run: pnpm run docs:links

            - name: Web lint & typecheck
              if: matrix.app == 'web'
              continue-on-error: true
              run: |
                  cd apps/web
                  pnpm run lint
                  pnpm run typecheck

    devtools:
        name: Devtools build
        runs-on: ubuntu-latest
        needs: openapi-lint
        if: github.event_name == 'push' || !startsWith(github.head_ref, 'chore/auto-model-statuses')
        steps:
            - uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.18.3
                  run_install: false
                  standalone: true
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Normalize pnpm lockfile line endings
              run: sed -i 's/\\r$//' pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build devtools packages
              run: |
                  pnpm --filter @ai-stats/devtools-core run build
                  pnpm --filter @ai-stats/devtools-viewer run build

    importer:
        name: Run importer on main
        runs-on: ubuntu-latest
        needs:
            - data
            - check-paths
        if: needs.check-paths.outputs.data-changed == 'true' && github.ref == 'refs/heads/main'
        env:
            SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        steps:
            - uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.18.3
                  run_install: false
                  standalone: true
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Normalize pnpm lockfile line endings
              run: sed -i 's/\\r$//' pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run importer (all sections)
              if: ${{ env.SUPABASE_SERVICE_ROLE_KEY != '' && env.NEXT_PUBLIC_SUPABASE_URL != '' }}
              env:
                  SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
                  NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
              shell: bash
              run: |
                  set -euo pipefail
                  for attempt in 1 2 3; do
                    echo "Running importer attempt ${attempt}/3"
                    if (cd apps/web && pnpm exec tsx scripts/importer/main.ts --section=all); then
                      echo "Importer succeeded on attempt ${attempt}"
                      exit 0
                    fi
                    if [ "${attempt}" -lt 3 ]; then
                      sleep_for=$((attempt * 15))
                      echo "Importer failed, retrying in ${sleep_for}s..."
                      sleep "${sleep_for}"
                    fi
                  done
                  echo "Importer failed after 3 attempts"
                  exit 1

    sdk-gen:
        name: Generate SDKs
        runs-on: ubuntu-latest
        needs: openapi-lint
        if: github.event_name == 'push' || !startsWith(github.head_ref, 'chore/auto-model-statuses')
        strategy:
            fail-fast: false
            matrix:
                include:
                    - sdk: ts
                      name: Generate TS SDK
                    - sdk: py
                      name: Generate PY SDK
                    - sdk: go
                      name: Generate GO SDK
                    - sdk: csharp
                      name: Generate C# SDK
                    - sdk: php
                      name: Generate PHP SDK
                    - sdk: ruby
                      name: Generate Ruby SDK
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.18.3
                  run_install: false
                  standalone: true
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Normalize pnpm lockfile line endings
              run: sed -i 's/\\r$//' pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # --- ACTUAL GENERATION ---
            - name: Generate ${{ matrix.sdk }} SDK
              run: |
                  case "${{ matrix.sdk }}" in
                    ts) pnpm run openapi:gen:ts ;;
                    py) pnpm run openapi:gen:py ;;
                    go) pnpm run openapi:gen:go ;;
                    csharp) pnpm run openapi:gen:csharp ;;
                    php) pnpm run openapi:gen:php ;;
                    ruby) pnpm run openapi:gen:ruby ;;
                  esac

            # --- EXISTING CONSISTENCY CHECK ---
            - name: Ensure OpenAPI outputs up to date
              run: |
                  case "${{ matrix.sdk }}" in
                    ts) gen_path="packages/sdk/sdk-ts/src/oapi-gen" ; gen_script="openapi:gen:ts" ;;
                    py) gen_path="packages/sdk/sdk-py/src/gen" ; gen_script="openapi:gen:py" ;;
                    go) gen_path="packages/sdk/sdk-go/src/gen" ; gen_script="openapi:gen:go" ;;
                    csharp) gen_path="packages/sdk/sdk-csharp/src/gen" ; gen_script="openapi:gen:csharp" ;;
                    php) gen_path="packages/sdk/sdk-php/src/gen" ; gen_script="openapi:gen:php" ;;
                    ruby) gen_path="packages/sdk/sdk-ruby/lib/gen" ; gen_script="openapi:gen:ruby" ;;
                  esac
                  echo "Checking that OpenAPI spec and '${{ matrix.sdk }}' SDK are up to date..."
                  if ! git diff --ignore-cr-at-eol --ignore-space-at-eol --quiet apps/docs/openapi/v1/openapi.yaml $gen_path; then
                    echo "::error::Detected *non-whitespace* differences in OpenAPI spec or generated '${{ matrix.sdk }}' SDK."
                    echo "::error::Please run 'pnpm run $gen_script' locally and commit the updated files."
                    echo ""
                    echo "Full diff:"
                    git diff apps/docs/openapi/v1/openapi.yaml $gen_path
                    exit 1
                  fi
                  echo "OpenAPI spec and '${{ matrix.sdk }}' SDK are in sync."

    packages:
        name: Build & test SDK packages
        runs-on: ubuntu-latest
        needs: sdk-gen
        if: github.event_name == 'push' || !startsWith(github.head_ref, 'chore/auto-model-statuses')
        steps:
            - uses: actions/checkout@v6

            - name: Set up Python for SDK builds
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Install Python build tooling
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install build pytest
                  python -m pip install -e packages/sdk/sdk-py

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.18.3
                  run_install: false
                  standalone: true
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Normalize pnpm lockfile line endings
              run: sed -i 's/\\r$//' pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build SDKs
              run: pnpm run validate:packages

    sdk-lifecycle-tests:
        name: SDK lifecycle tests (${{ matrix.sdk }})
        runs-on: ubuntu-latest
        needs: sdk-gen
        if: github.event_name == 'push' || !startsWith(github.head_ref, 'chore/auto-model-statuses')
        strategy:
            fail-fast: false
            matrix:
                sdk: [go, csharp, java, php, ruby]
        steps:
            - uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.18.3
                  run_install: false
                  standalone: true

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Normalize pnpm lockfile line endings
              run: sed -i 's/\\r$//' pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Setup Go
              if: matrix.sdk == 'go'
              uses: actions/setup-go@v6
              with:
                  go-version: "1.23"

            - name: Setup .NET
              if: matrix.sdk == 'csharp'
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "8.0.x"

            - name: Setup Java
              if: matrix.sdk == 'java'
              uses: actions/setup-java@v5
              with:
                  distribution: "temurin"
                  java-version: "17"
                  cache: "maven"

            - name: Setup PHP
              if: matrix.sdk == 'php'
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.2"

            - name: Setup Ruby
              if: matrix.sdk == 'ruby'
              uses: ruby/setup-ruby@v1
              with:
                  ruby-version: "3.2"

            - name: Run lifecycle tests
              run: pnpm run test:sdk-${{ matrix.sdk }}

    deploy-preview-web:
        name: Deploy Web (Preview)
        runs-on: ubuntu-latest
        needs: apps
        if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'chore/auto-model-statuses')
        permissions:
            contents: read
            deployments: write
        steps:
            - uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.18.3
                  run_install: false
                  standalone: true
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Normalize pnpm lockfile line endings
              run: sed -i 's/\\r$//' pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Vercel CLI
              run: npm install --global vercel@latest

            - name: Deploy web to Vercel (preview)
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
              if: ${{ env.VERCEL_PROJECT_ID != '' }}
              run: |
                  vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
                  vercel build --token=$VERCEL_TOKEN
                  vercel deploy --prebuilt --archive=tgz --token=$VERCEL_TOKEN

    deploy:
        runs-on: ubuntu-latest
        needs:
            - apps
        if: github.ref == 'refs/heads/main'
        permissions:
            contents: write
            deployments: write
        strategy:
            matrix:
                include:
                    - target: web
                      name: Deploy Web
                    - target: api
                      name: Deploy API
                    - target: docs
                      name: Deploy Docs
        steps:
            - uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.18.3
                  run_install: false
                  standalone: true
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            # ---------- WEB (Vercel) ----------
            - name: Normalize pnpm lockfile line endings
              run: sed -i 's/\\r$//' pnpm-lock.yaml

            - name: Install dependencies
              if: matrix.target == 'web'
              run: pnpm install --frozen-lockfile

            - name: Install Vercel CLI
              if: matrix.target == 'web'
              run: npm install --global vercel@latest

            - name: Deploy web to Vercel (production)
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
              if: ${{ matrix.target == 'web' && env.VERCEL_PROJECT_ID != '' }}
              run: |
                  vercel pull --yes --environment=production --token=$VERCEL_TOKEN
                  vercel build --prod --token=$VERCEL_TOKEN
                  vercel deploy --prebuilt --archive=tgz --prod --token=$VERCEL_TOKEN
            # ---------- API (Cloudflare Workers) ----------
            # Install deps so wrangler can resolve imports
            - name: Normalize pnpm lockfile line endings
              run: sed -i 's/\\r$//' pnpm-lock.yaml

            - name: Install dependencies (for API)
              if: matrix.target == 'api'
              run: pnpm install --frozen-lockfile

            - name: Validate Cloudflare API deploy secrets
              if: matrix.target == 'api'
              shell: bash
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              run: |
                  set -euo pipefail
                  missing=()
                  [ -z "${CLOUDFLARE_API_TOKEN:-}" ] && missing+=("CLOUDFLARE_API_TOKEN")
                  [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ] && missing+=("CLOUDFLARE_ACCOUNT_ID")
                  if [ "${#missing[@]}" -gt 0 ]; then
                    echo "::error::Missing required Cloudflare deploy secret(s): ${missing[*]}"
                    exit 1
                  fi

            - name: Validate wrangler.toml KV binding config
              if: matrix.target == 'api'
              shell: bash
              run: |
                  set -euo pipefail
                  cd apps/api
                  grep -q 'binding = "GATEWAY_CACHE"' wrangler.toml
                  if grep -q "REPLACE_WITH_KV_NAMESPACE" wrangler.toml; then
                    echo "::error::wrangler.toml still contains placeholder KV IDs"
                    cat wrangler.toml
                    exit 1
                  fi

            - name: Deploy API app to Cloudflare
              if: matrix.target == 'api'
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: apps/api

            # ---------- DOCS ----------
            - name: Docs (Mintlify deploy is handled by GitHub App)
              if: matrix.target == 'docs'
              run: echo "Mintlify picks up main branch changes and deploys docs automatically."

    publish:
        name: Handle Versions
        runs-on: ubuntu-latest
        needs:
            - sdk-gen
            - packages
            - sdk-lifecycle-tests
            - apps
        if: github.ref == 'refs/heads/main'
        env:
            NPM_CONFIG_PROVENANCE: true
        permissions:
            contents: write
            pull-requests: write
            id-token: write
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Create GitHub App token (AI Stats Bot)
              id: app-token
              uses: actions/create-github-app-token@v3
              with:
                  app-id: ${{ secrets.AI_STATS_APP_ID }}
                  private-key: ${{ secrets.AI_STATS_APP_PRIVATE_KEY }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.18.3
                  run_install: false
                  standalone: true
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  registry-url: https://registry.npmjs.org
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Check runtime versions (trusted publishing)
              run: |
                  node -v
                  npm -v

            - name: Normalize pnpm lockfile line endings
              run: sed -i 's/\\r$//' pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Preflight publishable npm packages
              run: |
                  pnpm --filter @ai-stats/sdk run build
                  pnpm --filter @ai-stats/ai-sdk-provider run build
                  pnpm --filter @ai-stats/devtools-viewer run build

            - name: Ensure SDK auto-release changeset
              env:
                  GITHUB_EVENT_BEFORE: ${{ github.event.before }}
                  GITHUB_SHA: ${{ github.sha }}
              run: pnpm run changeset:ensure-sdk-autorelease

            - name: Validate SDK semver policy
              env:
                  GITHUB_EVENT_BEFORE: ${{ github.event.before }}
                  GITHUB_SHA: ${{ github.sha }}
              run: pnpm run changeset:validate-sdk-semver

            - name: Create release PR / publish
              id: changesets
              uses: changesets/action@v1
              with:
                  version: pnpm run changeset:version
                  publish: pnpm run changeset:publish
                  createGithubReleases: false
                  commitMode: github-api
              env:
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

            - name: Set up Python (for PyPI publish)
              if: github.ref == 'refs/heads/main' && steps.changesets.outputs.published == 'true'
              uses: actions/setup-python@v6
              with:
                  python-version: 3.12

            - name: Build Python SDK
              if: github.ref == 'refs/heads/main' && steps.changesets.outputs.published == 'true'
              working-directory: packages/sdk/sdk-py
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install build
                  python -m build

            - name: Publish Python SDK to PyPI (Trusted Publishing)
              if: github.ref == 'refs/heads/main' && steps.changesets.outputs.published == 'true'
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: packages/sdk/sdk-py/dist
                  skip-existing: true

            - name: Create GitHub releases from changelogs
              if: steps.changesets.outputs.published == 'true'
              env:
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
                  AI_STATS_GH_RELEASE_MODE: all
              run: |
                  pnpm run release-from-changelogs

