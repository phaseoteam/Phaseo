name: SDK Publish Readiness

on:
  workflow_dispatch:
    inputs:
      checkSecrets:
        description: "Fail if required registry secrets are missing"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  agent-sdk:
    name: Agent SDK readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288
        with:
          version: 10.33.0
          run_install: false
          standalone: true
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      - name: Restore lockfile (guard setup-node cache mutation)
        run: git checkout -- pnpm-lock.yaml
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Build, test, and pack
        working-directory: packages/sdk/agent-sdk-ts
        run: |
          pnpm run build
          pnpm run test
          pnpm publish --dry-run --no-git-checks

  go:
    name: Go readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: "1.23"
      - name: Run tests
        working-directory: packages/sdk/sdk-go
        run: go test ./...

  csharp:
    name: C# readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: "8.0.x"
      - name: Build and pack
        run: |
          dotnet test packages/sdk/sdk-csharp/tests/Phaseo.Sdk.Tests/Phaseo.Sdk.Tests.csproj -c Release
          dotnet build packages/sdk/sdk-csharp/Phaseo.Sdk.csproj -c Release
          dotnet pack packages/sdk/sdk-csharp/Phaseo.Sdk.csproj -c Release -o artifacts/csharp
      - name: Check NuGet trusted publishing user (optional override)
        if: inputs.checkSecrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ vars.NUGET_TRUSTED_PUBLISHING_USER }}" ]; then
            echo "NUGET_TRUSTED_PUBLISHING_USER is not set; publish workflow will fall back to github.repository_owner."
          fi

  java:
    name: Java readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"
      - name: Build
        run: |
          mvn -B -f packages/sdk/sdk-java/pom.xml test
          mvn -B -f packages/sdk/sdk-java/pom.xml -DskipTests verify
      - name: Check Maven Central + GPG secrets
        if: inputs.checkSecrets
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [ -z "${MAVEN_CENTRAL_USERNAME:-}" ] && missing+=("MAVEN_CENTRAL_USERNAME")
          [ -z "${MAVEN_CENTRAL_PASSWORD:-}" ] && missing+=("MAVEN_CENTRAL_PASSWORD")
          [ -z "${MAVEN_GPG_PRIVATE_KEY:-}" ] && missing+=("MAVEN_GPG_PRIVATE_KEY")
          [ -z "${MAVEN_GPG_PASSPHRASE:-}" ] && missing+=("MAVEN_GPG_PASSPHRASE")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required secret(s): ${missing[*]}"
            exit 1
          fi

  php:
    name: PHP readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          php-version: "8.2"
      - name: Validate composer package
        working-directory: packages/sdk/sdk-php
        run: |
          composer validate --strict
          php tests/lifecycle_test.php
      - name: Check Packagist secrets
        if: inputs.checkSecrets
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_MAIN_TOKEN: ${{ secrets.PACKAGIST_MAIN_TOKEN }}
          PHP_SDK_SPLIT_REPO_TOKEN: ${{ secrets.PHP_SDK_SPLIT_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${PACKAGIST_USERNAME:-}" ] || { echo "::error::Missing PACKAGIST_USERNAME"; exit 1; }
          [ -n "${PACKAGIST_MAIN_TOKEN:-}" ] || { echo "::error::Missing PACKAGIST_MAIN_TOKEN"; exit 1; }
          [ -n "${PHP_SDK_SPLIT_REPO_TOKEN:-}" ] || { echo "::error::Missing PHP_SDK_SPLIT_REPO_TOKEN"; exit 1; }

  ruby:
    name: Ruby readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74
        with:
          ruby-version: "3.2"
      - name: Build gem
        working-directory: packages/sdk/sdk-ruby
        run: |
          ruby tests/lifecycle_test.rb
          gem build phaseo_sdk.gemspec
      - name: Check RubyGems secret
        if: inputs.checkSecrets
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${RUBYGEMS_API_KEY:-}" ] || { echo "::error::Missing RUBYGEMS_API_KEY"; exit 1; }
