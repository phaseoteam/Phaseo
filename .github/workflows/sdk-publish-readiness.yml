name: SDK Publish Readiness

on:
  workflow_dispatch:
    inputs:
      checkSecrets:
        description: "Fail if required registry secrets are missing"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  go:
    name: Go readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
      - name: Run tests
        working-directory: packages/sdk/sdk-go
        run: go test ./...

  csharp:
    name: C# readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build and pack
        run: |
          dotnet test packages/sdk/sdk-csharp/tests/AIStats.Sdk.Tests/AIStats.Sdk.Tests.csproj -c Release
          dotnet build packages/sdk/sdk-csharp/AIStats.Sdk.csproj -c Release
          dotnet pack packages/sdk/sdk-csharp/AIStats.Sdk.csproj -c Release -o artifacts/csharp
      - name: Check NuGet secret
        if: inputs.checkSecrets
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${NUGET_API_KEY:-}" ] || { echo "::error::Missing NUGET_API_KEY"; exit 1; }

  java:
    name: Java readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"
      - name: Build
        run: |
          mvn -B -f packages/sdk/sdk-java/pom.xml test
          mvn -B -f packages/sdk/sdk-java/pom.xml -DskipTests verify
      - name: Check Maven Central + GPG secrets
        if: inputs.checkSecrets
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [ -z "${MAVEN_CENTRAL_USERNAME:-}" ] && missing+=("MAVEN_CENTRAL_USERNAME")
          [ -z "${MAVEN_CENTRAL_PASSWORD:-}" ] && missing+=("MAVEN_CENTRAL_PASSWORD")
          [ -z "${MAVEN_GPG_PRIVATE_KEY:-}" ] && missing+=("MAVEN_GPG_PRIVATE_KEY")
          [ -z "${MAVEN_GPG_PASSPHRASE:-}" ] && missing+=("MAVEN_GPG_PASSPHRASE")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required secret(s): ${missing[*]}"
            exit 1
          fi

  php:
    name: PHP readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - name: Validate composer package
        working-directory: packages/sdk/sdk-php
        run: |
          composer validate --strict
          php tests/lifecycle_test.php
      - name: Check Packagist secrets
        if: inputs.checkSecrets
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${PACKAGIST_USERNAME:-}" ] || { echo "::error::Missing PACKAGIST_USERNAME"; exit 1; }
          [ -n "${PACKAGIST_TOKEN:-}" ] || { echo "::error::Missing PACKAGIST_TOKEN"; exit 1; }

  ruby:
    name: Ruby readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
      - name: Build gem
        working-directory: packages/sdk/sdk-ruby
        run: |
          ruby tests/lifecycle_test.rb
          gem build ai_stats_sdk.gemspec
      - name: Check RubyGems secret
        if: inputs.checkSecrets
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${RUBYGEMS_API_KEY:-}" ] || { echo "::error::Missing RUBYGEMS_API_KEY"; exit 1; }
