name: Publish Java SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (defaults to packages/sdk/sdk-java/package.json version)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish-java:
    runs-on: ubuntu-latest
    steps:
      - name: Require main branch
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Run this workflow from refs/heads/main only."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Setup Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            version="${INPUT_VERSION}"
          else
            version="$(node -p "require('./packages/sdk/sdk-java/package.json').version")"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: $version"
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Validate telemetry literal matches publish version
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("node:fs");
          const version = process.env.VERSION;
          const filePath = "packages/sdk/sdk-java/src/ai/stats/sdk/AIStats.java";
          const source = fs.readFileSync(filePath, "utf8");
          const match = source.match(/new TelemetryRecorder\(devtoolsConfig,\s*"([^"]+)"\)/);
          if (!match) {
            console.error(`::error::Unable to find telemetry version literal in ${filePath}.`);
            process.exit(1);
          }
          const actual = match[1];
          if (actual !== version) {
            console.error(`::error::Telemetry version mismatch in ${filePath}: expected ${version}, found ${actual}. Run pnpm run sdk:sync-language-manifests and commit the update before publishing.`);
            process.exit(1);
          }
          NODE

      - name: Check required secrets
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [ -z "${MAVEN_CENTRAL_USERNAME:-}" ] && missing+=("MAVEN_CENTRAL_USERNAME")
          [ -z "${MAVEN_CENTRAL_PASSWORD:-}" ] && missing+=("MAVEN_CENTRAL_PASSWORD")
          [ -z "${MAVEN_GPG_PRIVATE_KEY:-}" ] && missing+=("MAVEN_GPG_PRIVATE_KEY")
          [ -z "${MAVEN_GPG_PASSPHRASE:-}" ] && missing+=("MAVEN_GPG_PASSPHRASE")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Set pom version
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          pom = Path("packages/sdk/sdk-java/pom.xml")
          source = pom.read_text(encoding="utf-8")
          pattern = re.compile(r"(<artifactId>ai-stats-sdk</artifactId>\s*[\r\n]+\s*<version>)([^<]+)(</version>)", re.MULTILINE)
          updated, count = pattern.subn(rf"\1{version}\3", source, count=1)
          if count != 1:
            raise SystemExit("Unable to set version in pom.xml")
          pom.write_text(updated, encoding="utf-8")
          PY

      - name: Import GPG key
        env:
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if echo "$MAVEN_GPG_PRIVATE_KEY" | grep -q "BEGIN PGP PRIVATE KEY BLOCK"; then
            echo "$MAVEN_GPG_PRIVATE_KEY" | gpg --batch --import
          else
            echo "$MAVEN_GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          fi

      - name: Configure Maven credentials
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>central</id>
                <username>${MAVEN_CENTRAL_USERNAME}</username>
                <password>${MAVEN_CENTRAL_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build and publish to Maven Central
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          mvn -B -f packages/sdk/sdk-java/pom.xml test
          mvn -B -f packages/sdk/sdk-java/pom.xml -DskipTests verify
          mvn -B -f packages/sdk/sdk-java/pom.xml -Prelease -DskipTests -Dgpg.passphrase="$MAVEN_GPG_PASSPHRASE" deploy
