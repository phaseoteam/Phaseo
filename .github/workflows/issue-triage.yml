name: Issue Triage

on:
    issues:
        types: [opened]
    issue_comment:
        types: [created]

jobs:
    triage:
        name: AI issue triage
        if: |
            github.event_name == 'issues' ||
            (
              github.event_name == 'issue_comment' &&
              github.event.issue.pull_request == null &&
              github.actor != 'github-actions[bot]'
            )
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
            issues: write
        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - uses: anomalyco/opencode/github@latest
              env:
                  OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
              with:
                  model: opencode/gpt-5-nano
                  prompt: |
                      You are responding to a new GitHub issue on AI Stats.
                      AI Stats is an open-source monorepo with a Next.js web app, Cloudflare
                      Worker API gateway, docs, and SDKs.

                      Your job is to produce either:
                      1) clarifying questions when the issue is vague, OR
                      2) a copy/paste prompt the maintainer can give to an AI coding agent.

                      Always start with this exact sentence:
                      We're super sorry about this issue you're facing! We'll have someone look at this as soon as possible.

                      Output rules:
                      - Do NOT output "Quick Overview" or "Possible Cause & Suggested Fix".
                      - Do NOT provide long root-cause speculation.
                      - Keep responses concise and actionable.
                      - Put interpretation in an expandable section:
                        <details><summary>Issue understanding</summary>...</details>

                      Decision logic:
                      - If this issue thread already contains your prior clarifying questions
                        and the latest comment answers them, generate the AI Agent Prompt now.
                      - If the report is missing key reproduction details, output:
                        ### Clarifying Questions
                        Ask 1-3 specific questions needed to make implementation unambiguous.
                        Then add:
                        ### Next Step
                        Say you will generate a copy/paste AI agent prompt after answers are provided.
                      - If the report is specific enough, output:
                        ### AI Agent Prompt (Copy/Paste)
                        Provide a single fenced ```text``` block containing a ready-to-run
                        prompt for an AI coding agent.

                      The AI Agent Prompt must include:
                      - Goal
                      - Relevant context from the issue
                      - Implementation requirements
                      - Acceptance criteria
                      - Validation steps (tests/checks)
                      - Output format expected from the agent

                      End every response with:
                      *This is an automated response - a team member will follow up shortly.*
