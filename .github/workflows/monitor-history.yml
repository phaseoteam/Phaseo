name: Update Monitor History

on:
    schedule:
        - cron: "0 * * * *"
    workflow_dispatch:
        inputs:
            full_rebuild:
                description: Force a full rebuild of monitor history from the configured base SHA.
                required: false
                default: false
                type: boolean
            base_sha:
                description: Optional override base SHA for a manual full rebuild.
                required: false
                type: string

permissions:
    contents: read

concurrency:
    group: sync-monitor-history-db
    cancel-in-progress: false

jobs:
    sync-monitor-history:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        env:
            NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            MONITOR_HISTORY_BASE_SHA: ${{ github.event.inputs.base_sha || vars.MONITOR_HISTORY_BASE_SHA || '' }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
              with:
                  fetch-depth: 0 # needed to diff before..after reliably

            - name: Setup pnpm
              uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288
              with:
                  version: 10.33.0
                  run_install: false
            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
              with:
                  node-version: "22"

            - name: Restore lockfile (guard setup-node cache mutation)
              run: git checkout -- pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Sync monitor history to Supabase
              shell: bash
              run: |
                  set -euo pipefail
                  cd apps/web
                  args=()

                  if [ "${{ github.event.inputs.full_rebuild || 'false' }}" = "true" ]; then
                    args+=(--full-rebuild)
                  fi

                  if [ -n "${MONITOR_HISTORY_BASE_SHA:-}" ]; then
                    args+=(--from "$MONITOR_HISTORY_BASE_SHA")
                  fi

                  pnpm exec tsx scripts/sync-monitor-history-to-supabase.ts "${args[@]}"
