name: Check Internal Models

on:
    workflow_run:
        workflows: ["CI"]
        types: [completed]
    workflow_dispatch:

concurrency:
    group: check-internal-models
    cancel-in-progress: false

env:
    NODE_VERSION: 22
    DISCORD_WEBHOOK_NEW_MODELS_PUBLIC: ${{ secrets.DISCORD_WEBHOOK_NEW_MODELS_PUBLIC }}
    MODEL_DISCOVERY_STATE_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}

permissions:
    contents: read

jobs:
    check-internal-models:
        name: Check internal models
        runs-on: ubuntu-latest
        if: >-
            github.event_name == 'workflow_dispatch' ||
            (github.event.workflow_run.event == 'push' &&
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.head_branch == 'main')
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
              with:
                  ref: ${{ github.event.workflow_run.head_sha || github.sha }}
                  fetch-depth: 0
                  persist-credentials: false

            - name: Setup pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
              with:
                  version: 10.33.0
                  run_install: false

            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore lockfile (guard setup-node cache mutation)
              run: git checkout -- pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Ensure state directory exists
              run: mkdir -p scripts/model-discovery/state

            - name: Restore internal model state cache
              id: internal-model-state-cache
              uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
              with:
                  path: scripts/model-discovery/state
                  key: internal-model-state-${{ env.MODEL_DISCOVERY_STATE_BRANCH }}-${{ github.run_id }}
                  restore-keys: |
                      internal-model-state-${{ env.MODEL_DISCOVERY_STATE_BRANCH }}-

            - name: Check for internal models
              run: |
                  pnpm exec tsx scripts/model-discovery/run-internal-public.ts \
                    --discord-role-id "1377690778478055584" \
                    --discord-avatar-url "https://phaseo.app/png_logo_light.png" \
                    --skip-hf

            - name: Save internal model state cache
              if: always()
              uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
              with:
                  path: scripts/model-discovery/state
                  key: ${{ steps.internal-model-state-cache.outputs.cache-primary-key }}
