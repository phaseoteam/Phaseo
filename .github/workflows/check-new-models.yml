name: Check New Models

on:
    schedule:
        - cron: "*/15 * * * *"
    workflow_dispatch:

concurrency:
    group: check-new-models
    cancel-in-progress: false

env:
    NODE_VERSION: 22
    DISCORD_WEBHOOK_NEW_MODELS_PUBLIC: ${{ secrets.DISCORD_WEBHOOK_NEW_MODELS_PUBLIC }}
    DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    DISCORD_ROLE_ID_MODEL_UPDATES: "1377690778478055584"

permissions:
    contents: read

jobs:
    check-new-models:
        name: Check for new models
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - name: Setup pnpm
              uses: pnpm/action-setup@v5
              with:
                  version: 10.15.1
                  run_install: false
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Ensure state directory exists
              run: mkdir -p scripts/model-discovery/state

            - name: Restore internal model state cache
              id: internal-model-state-cache
              uses: actions/cache/restore@v5
              with:
                  path: scripts/model-discovery/state
                  key: internal-model-state-${{ github.run_id }}
                  restore-keys: |
                      internal-model-state-

            - name: Check for new internal models
              run: |
                  pnpm exec tsx scripts/model-discovery/run-internal-public.ts \
                    --discord-user-id "${{ secrets.DISCORD_USER_ID }}" \
                    --discord-role-id "${{ env.DISCORD_ROLE_ID_MODEL_UPDATES }}" \
                    --discord-avatar-url "https://ai-stats.phaseo.app/png_logo_light.png"

            - name: Check for new external provider models
              env:
                  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
                  DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
                  DISCORD_ROLE_ID: ${{ env.DISCORD_ROLE_ID_MODEL_UPDATES }}
                  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
                  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
                  AION_LABS_API_KEY: ${{ secrets.AION_LABS_API_KEY }}
                  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                  ARCEE_AI_API_KEY: ${{ secrets.ARCEE_AI_API_KEY }}
              run: |
                  if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ] || [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ]; then
                    echo "Skipping external provider model check: missing Supabase secrets."
                    exit 0
                  fi
                  pnpm exec tsx scripts/model-discovery/run.ts

            - name: Check for new external Hugging Face models
              env:
                  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
                  DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
                  DISCORD_ROLE_ID: ${{ env.DISCORD_ROLE_ID_MODEL_UPDATES }}
              run: |
                  pnpm exec tsx scripts/model-discovery/run-hf-private.ts \
                    --discord-user-id "${{ secrets.DISCORD_USER_ID }}" \
                    --discord-role-id "${{ env.DISCORD_ROLE_ID_MODEL_UPDATES }}" \
                    --hf-orgs "${{ vars.HF_WATCH_ORGS }}" \
                    --hf-token "${{ secrets.HF_TOKEN }}"

            - name: Save internal model state cache
              if: always()
              uses: actions/cache/save@v5
              with:
                  path: scripts/model-discovery/state
                  key: ${{ steps.internal-model-state-cache.outputs.cache-primary-key }}

