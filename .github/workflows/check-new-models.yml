name: Check New Models

on:
    schedule:
        - cron: "*/15 * * * *"
    workflow_dispatch:

concurrency:
    group: check-new-models
    cancel-in-progress: false

env:
    NODE_VERSION: 22

permissions:
    contents: read

jobs:
    check-new-models:
        name: Check for new models
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.15.1
                  run_install: false
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Ensure state directory exists
              run: mkdir -p scripts/model-discovery/state

            - name: Restore internal model state cache
              id: internal-model-state-cache
              uses: actions/cache/restore@v5
              with:
                  path: scripts/model-discovery/state
                  key: internal-model-state-${{ github.run_id }}
                  restore-keys: |
                      internal-model-state-

            - name: Check for new internal models
              run: |
                  pnpm exec tsx scripts/model-discovery/run-internal.ts \
                    --webhook-url "${{ secrets.DISCORD_WEBHOOK_URL }}" \
                    --discord-user-id "${{ secrets.DISCORD_USER_ID }}" \
                    --discord-role-id "${{ secrets.DISCORD_ROLE_ID }}" \
                    --hf-orgs "${{ vars.HF_WATCH_ORGS }}" \
                    --hf-token "${{ secrets.HF_TOKEN }}"

            - name: Save internal model state cache
              if: always()
              uses: actions/cache/save@v5
              with:
                  path: scripts/model-discovery/state
                  key: ${{ steps.internal-model-state-cache.outputs.cache-primary-key }}

