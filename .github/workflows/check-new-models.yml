name: Check New Models

on:
    schedule:
        - cron: "*/15 * * * *"
    workflow_dispatch:

concurrency:
    group: check-new-models
    cancel-in-progress: false

env:
    NODE_VERSION: 22
    DISCORD_WEBHOOK_NEW_MODELS_PUBLIC: ${{ secrets.DISCORD_WEBHOOK_NEW_MODELS_PUBLIC }}
    DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    DISCORD_ROLE_ID_MODEL_UPDATES: "1377690778478055584"
    DISCORD_ROLE_ID_DEV: ${{ vars.DISCORD_ROLE_ID_DEV }}

permissions:
    contents: read
    issues: write

jobs:
    check-new-models:
        name: Check for new models
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - name: Setup pnpm
              uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288
              with:
                  version: 10.33.0
                  run_install: false
            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore lockfile (guard setup-node cache mutation)
              run: git checkout -- pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Ensure state directory exists
              run: mkdir -p scripts/model-discovery/state

            - name: Test GitHub issue sync helpers
              run: pnpm exec tsx scripts/model-discovery/github-issues.test.ts

            - name: Restore internal model state cache
              id: internal-model-state-cache
              uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
              with:
                  path: scripts/model-discovery/state
                  key: internal-model-state-${{ github.ref_name }}-${{ github.run_id }}
                  restore-keys: |
                      internal-model-state-${{ github.ref_name }}-

            - name: Check for new internal models
              env:
                  DISCORD_WEBHOOK_NEW_MODELS_PUBLIC: ${{ github.ref == 'refs/heads/main' && secrets.DISCORD_WEBHOOK_NEW_MODELS_PUBLIC || '' }}
              run: |
                  pnpm exec tsx scripts/model-discovery/run-internal-public.ts \
                    --discord-role-id "${{ env.DISCORD_ROLE_ID_MODEL_UPDATES }}" \
                    --discord-avatar-url "https://ai-stats.phaseo.app/png_logo_light.png"

            - name: Check for new external provider models
              if: github.ref == 'refs/heads/main'
              env:
                  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
                  DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
                  DISCORD_ROLE_ID: ${{ env.DISCORD_ROLE_ID_MODEL_UPDATES }}
                  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
                  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
                  AION_LABS_API_KEY: ${{ secrets.AION_LABS_API_KEY }}
                  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                  ARCEE_AI_API_KEY: ${{ secrets.ARCEE_AI_API_KEY }}
                  GITHUB_TOKEN: ${{ github.token }}
              run: |
                  if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ] || [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ]; then
                    echo "Skipping external provider model check: missing Supabase secrets."
                    exit 0
                  fi
                  pnpm exec tsx scripts/model-discovery/run.ts

            - name: Check for new external Hugging Face models
              if: github.ref == 'refs/heads/main'
              env:
                  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
                  DISCORD_ROLE_ID_DEV: ${{ env.DISCORD_ROLE_ID_DEV }}
              run: |
                  pnpm exec tsx scripts/model-discovery/run-hf-private.ts \
                    --discord-role-id "${{ env.DISCORD_ROLE_ID_DEV }}" \
                    --hf-orgs "${{ vars.HF_WATCH_ORGS }}" \
                    --hf-token "${{ secrets.HF_TOKEN }}"

            - name: Save internal model state cache
              if: always()
              uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
              with:
                  path: scripts/model-discovery/state
                  key: ${{ steps.internal-model-state-cache.outputs.cache-primary-key }}
