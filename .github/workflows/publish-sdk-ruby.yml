name: Publish Ruby SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (defaults to packages/sdk/sdk-ruby/package.json version)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish-ruby:
    runs-on: ubuntu-latest
    steps:
      - name: Require main branch
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Run this workflow from refs/heads/main only."
            exit 1
          fi

      - name: Create GitHub App token (AI Stats Bot)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          app-id: ${{ secrets.AI_STATS_APP_ID }}
          private-key: ${{ secrets.AI_STATS_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Setup Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74
        with:
          ruby-version: "3.2"

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            version="${INPUT_VERSION}"
          else
            version="$(node -p "require('./packages/sdk/sdk-ruby/package.json').version")"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: $version"
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Validate telemetry literals match publish version
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("node:fs");
          const version = process.env.VERSION;
          const filePath = "packages/sdk/sdk-ruby/lib/index.rb";
          const source = fs.readFileSync(filePath, "utf8");
          const checks = [
            {
              label: "TelemetryRecorder constructor version",
              pattern: /TelemetryRecorder\.new\(devtools,\s*"([^"]+)"\)/,
            },
            {
              label: "TelemetryRecorder default version",
              pattern: /def initialize\(config = nil, sdk_version = "([^"]+)"\)/,
            },
          ];
          for (const check of checks) {
            const match = source.match(check.pattern);
            if (!match) {
              console.error(`::error::Unable to find ${check.label} in ${filePath}.`);
              process.exit(1);
            }
            const actual = match[1];
            if (actual !== version) {
              console.error(`::error::${check.label} mismatch in ${filePath}: expected ${version}, found ${actual}. Run pnpm run sdk:sync-language-manifests and commit the update before publishing.`);
              process.exit(1);
            }
          }
          NODE

      - name: Set gem version
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          ruby -e "f='packages/sdk/sdk-ruby/lib/ai_stats_sdk/version.rb'; s=File.read(f); s=s.gsub(/VERSION\\s*=\\s*\"[^\"]+\"/, 'VERSION = \"' + ENV.fetch('VERSION') + '\"'); File.write(f,s)"

      - name: Build gem
        working-directory: packages/sdk/sdk-ruby
        run: |
          ruby tests/lifecycle_test.rb
          gem build ai_stats_sdk.gemspec

      - name: Create and push SDK tag
        env:
          VERSION: ${{ steps.version.outputs.value }}
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="sdk-ruby/v${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag already exists locally: $tag"
          else
            git tag -a "$tag" -m "Ruby SDK v${VERSION}"
          fi
          if git ls-remote --tags origin "$tag" | grep -q "$tag"; then
            echo "Tag already exists on origin: $tag"
          else
            git push "https://x-access-token:${GH_APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$tag"
          fi

      - name: Publish to RubyGems
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${RUBYGEMS_API_KEY:-}" ]; then
            echo "::error::Missing RUBYGEMS_API_KEY secret."
            exit 1
          fi
          mkdir -p ~/.gem
          cat > ~/.gem/credentials <<EOF
          ---
          :rubygems_api_key: ${RUBYGEMS_API_KEY}
          EOF
          chmod 0600 ~/.gem/credentials
          gem push packages/sdk/sdk-ruby/ai_stats_sdk-${{ steps.version.outputs.value }}.gem
