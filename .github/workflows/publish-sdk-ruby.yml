name: Publish Ruby SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (defaults to packages/sdk/sdk-ruby/package.json version)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish-ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version="$(node -p "require('./packages/sdk/sdk-ruby/package.json').version")"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Set gem version
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          ruby -e "f='packages/sdk/sdk-ruby/lib/ai_stats_sdk/version.rb'; s=File.read(f); s=s.gsub(/VERSION\\s*=\\s*\"[^\"]+\"/, 'VERSION = \"' + ENV.fetch('VERSION') + '\"'); File.write(f,s)"

      - name: Build gem
        working-directory: packages/sdk/sdk-ruby
        run: |
          ruby tests/lifecycle_test.rb
          gem build ai_stats_sdk.gemspec

      - name: Create and push SDK tag
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          tag="sdk-ruby/v${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag already exists locally: $tag"
          else
            git tag -a "$tag" -m "Ruby SDK v${VERSION}"
          fi
          if git ls-remote --tags origin "$tag" | grep -q "$tag"; then
            echo "Tag already exists on origin: $tag"
          else
            git push origin "$tag"
          fi

      - name: Publish to RubyGems
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${RUBYGEMS_API_KEY:-}" ]; then
            echo "::error::Missing RUBYGEMS_API_KEY secret."
            exit 1
          fi
          mkdir -p ~/.gem
          cat > ~/.gem/credentials <<EOF
          ---
          :rubygems_api_key: ${RUBYGEMS_API_KEY}
          EOF
          chmod 0600 ~/.gem/credentials
          gem push packages/sdk/sdk-ruby/ai_stats_sdk-${{ steps.version.outputs.value }}.gem
