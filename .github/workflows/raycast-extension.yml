name: Raycast extension

on:
  pull_request:
    paths:
      - "packages/devtools/raycast-extension/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/raycast-extension.yml"
  push:
    branches: [main]
    paths:
      - "packages/devtools/raycast-extension/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/raycast-extension.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Lint and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint extension
        working-directory: packages/devtools/raycast-extension
        run: pnpm run lint

      - name: Build extension
        working-directory: packages/devtools/raycast-extension
        run: pnpm run build
