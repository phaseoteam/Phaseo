name: Publish PHP SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (defaults to packages/sdk/sdk-php/package.json version)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish-php:
    runs-on: ubuntu-latest
    steps:
      - name: Require main branch
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Run this workflow from refs/heads/main only."
            exit 1
          fi

      - name: Create GitHub App token (AI Stats Bot)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          app-id: ${{ secrets.AI_STATS_APP_ID }}
          private-key: ${{ secrets.AI_STATS_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          php-version: "8.2"

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            version="${INPUT_VERSION}"
          else
            version="$(node -p "require('./packages/sdk/sdk-php/package.json').version")"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: $version"
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Validate telemetry literal matches publish version
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("node:fs");
          const version = process.env.VERSION;
          const filePath = "packages/sdk/sdk-php/src/index.php";
          const source = fs.readFileSync(filePath, "utf8");
          const match = source.match(/new TelemetryRecorder\(\$devtools,\s*"([^"]+)"\)/);
          if (!match) {
            console.error(`::error::Unable to find telemetry version literal in ${filePath}.`);
            process.exit(1);
          }
          const actual = match[1];
          if (actual !== version) {
            console.error(`::error::Telemetry version mismatch in ${filePath}: expected ${version}, found ${actual}. Run pnpm run sdk:sync-language-manifests and commit the update before publishing.`);
            process.exit(1);
          }
          NODE

      - name: Validate composer package
        run: |
          php -v
          php -r "json_decode(file_get_contents('packages/sdk/sdk-php/composer.json')); if (json_last_error()) { fwrite(STDERR, 'Invalid composer.json'.PHP_EOL); exit(1);} "
          php packages/sdk/sdk-php/tests/lifecycle_test.php

      - name: Create and push SDK tag
        env:
          VERSION: ${{ steps.version.outputs.value }}
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="sdk-php/v${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag already exists locally: $tag"
          else
            git tag -a "$tag" -m "PHP SDK v${VERSION}"
          fi
          if git ls-remote --tags origin "$tag" | grep -q "$tag"; then
            echo "Tag already exists on origin: $tag"
          else
            git push "https://x-access-token:${GH_APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$tag"
          fi

      - name: Sync PHP split repo and publish split tag
        id: split_repo
        env:
          VERSION: ${{ steps.version.outputs.value }}
          PHP_SDK_SPLIT_REPO: ${{ vars.PHP_SDK_SPLIT_REPO }}
          PHP_SDK_SPLIT_REPO_TOKEN: ${{ secrets.PHP_SDK_SPLIT_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PHP_SDK_SPLIT_REPO_TOKEN:-}" ]; then
            echo "::error::Missing PHP_SDK_SPLIT_REPO_TOKEN secret."
            exit 1
          fi

          split_repo="${PHP_SDK_SPLIT_REPO:-AI-Stats/ai-stats-php-sdk}"
          split_repo_url="https://github.com/${split_repo}"
          split_remote_url="https://x-access-token:${PHP_SDK_SPLIT_REPO_TOKEN}@github.com/${split_repo}.git"

          git remote add split "$split_remote_url"

          split_commit="$(git subtree split --prefix=packages/sdk/sdk-php HEAD)"
          git push --force split "${split_commit}:main"

          split_tag="v${VERSION}"
          if git ls-remote --tags split "refs/tags/${split_tag}" | grep -q "refs/tags/${split_tag}$"; then
            echo "Split repo tag already exists: ${split_tag}"
          else
            git push split "${split_commit}:refs/tags/${split_tag}"
            echo "Published split repo tag: ${split_tag}"
          fi

          echo "repo_url=${split_repo_url}" >> "$GITHUB_OUTPUT"

      - name: Notify Packagist
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_MAIN_TOKEN: ${{ secrets.PACKAGIST_MAIN_TOKEN }}
          PACKAGIST_REPOSITORY_URL: ${{ steps.split_repo.outputs.repo_url }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PACKAGIST_USERNAME:-}" ] || [ -z "${PACKAGIST_MAIN_TOKEN:-}" ]; then
            echo "::error::Missing PACKAGIST_USERNAME or PACKAGIST_MAIN_TOKEN."
            exit 1
          fi
          if [ -z "${PACKAGIST_REPOSITORY_URL:-}" ]; then
            echo "::error::Missing split repository URL output."
            exit 1
          fi
          curl -fsS -X POST "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_MAIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"repository\":{\"url\":\"${PACKAGIST_REPOSITORY_URL}\"}}"
