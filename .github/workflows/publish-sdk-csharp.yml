name: Publish C# SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (defaults to packages/sdk/sdk-csharp/package.json version)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-csharp:
    runs-on: ubuntu-latest
    steps:
      - name: Require main branch
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Run this workflow from refs/heads/main only."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: "8.0.x"

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            version="${INPUT_VERSION}"
          else
            version="$(node -p "require('./packages/sdk/sdk-csharp/package.json').version")"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: $version"
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Validate telemetry literal matches publish version
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("node:fs");
          const version = process.env.VERSION;
          const filePath = "packages/sdk/sdk-csharp/Client.cs";
          const source = fs.readFileSync(filePath, "utf8");
          const match = source.match(/new TelemetryRecorder\(devtools,\s*"([^"]+)"\)/);
          if (!match) {
            console.error(`::error::Unable to find telemetry version literal in ${filePath}.`);
            process.exit(1);
          }
          const actual = match[1];
          if (actual !== version) {
            console.error(`::error::Telemetry version mismatch in ${filePath}: expected ${version}, found ${actual}. Run pnpm run sdk:sync-language-manifests and commit the update before publishing.`);
            process.exit(1);
          }
          NODE

      - name: Build package
        run: |
          dotnet test packages/sdk/sdk-csharp/tests/AIStats.Sdk.Tests/AIStats.Sdk.Tests.csproj -c Release
          dotnet pack packages/sdk/sdk-csharp/AIStats.Sdk.csproj \
            -c Release \
            -o artifacts/csharp \
            /p:Version=${{ steps.version.outputs.value }} \
            /p:PackageVersion=${{ steps.version.outputs.value }}

      - name: NuGet login (OIDC -> temporary API key)
        id: nuget_login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841
        with:
          user: ${{ vars.NUGET_TRUSTED_PUBLISHING_USER || github.repository_owner }}

      - name: Publish to NuGet
        run: |
          dotnet nuget push "artifacts/csharp/*.nupkg" \
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
          dotnet nuget push "artifacts/csharp/*.snupkg" \
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
