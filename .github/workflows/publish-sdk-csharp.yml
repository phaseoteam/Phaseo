name: Publish C# SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (defaults to packages/sdk/sdk-csharp/package.json version)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version="$(node -p "require('./packages/sdk/sdk-csharp/package.json').version")"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Build package
        run: |
          dotnet test packages/sdk/sdk-csharp/tests/AIStats.Sdk.Tests/AIStats.Sdk.Tests.csproj -c Release
          dotnet pack packages/sdk/sdk-csharp/AIStats.Sdk.csproj \
            -c Release \
            -o artifacts/csharp \
            /p:Version=${{ steps.version.outputs.value }} \
            /p:PackageVersion=${{ steps.version.outputs.value }}

      - name: NuGet login (OIDC -> temporary API key)
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_TRUSTED_PUBLISHING_USER || github.repository_owner }}

      - name: Publish to NuGet
        run: |
          dotnet nuget push "artifacts/csharp/*.nupkg" \
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
          dotnet nuget push "artifacts/csharp/*.snupkg" \
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
