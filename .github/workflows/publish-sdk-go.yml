name: Publish Go SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag (defaults to packages/sdk/sdk-go/package.json version)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish-go:
    runs-on: ubuntu-latest
    steps:
      - name: Require main branch
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Run this workflow from refs/heads/main only."
            exit 1
          fi

      - name: Create GitHub App token (AI Stats Bot)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          app-id: ${{ secrets.AI_STATS_APP_ID }}
          private-key: ${{ secrets.AI_STATS_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.23"

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            version="${INPUT_VERSION}"
          else
            version="$(node -p "require('./packages/sdk/sdk-go/package.json').version")"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: $version"
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Validate telemetry literal matches publish version
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("node:fs");
          const version = process.env.VERSION;
          const filePath = "packages/sdk/sdk-go/devtools.go";
          const source = fs.readFileSync(filePath, "utf8");
          const match = source.match(/const goSDKVersion = "([^"]+)"/);
          if (!match) {
            console.error(`::error::Unable to find telemetry version literal in ${filePath}.`);
            process.exit(1);
          }
          const actual = match[1];
          if (actual !== version) {
            console.error(`::error::Telemetry version mismatch in ${filePath}: expected ${version}, found ${actual}. Run pnpm run sdk:sync-language-manifests and commit the update before publishing.`);
            process.exit(1);
          }
          NODE

      - name: Run tests
        working-directory: packages/sdk/sdk-go
        run: go test ./...

      - name: Create and push module tag
        env:
          VERSION: ${{ steps.version.outputs.value }}
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="packages/sdk/sdk-go/v${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag already exists locally: $tag"
          else
            git tag -a "$tag" -m "Go SDK v${VERSION}"
          fi
          if git ls-remote --tags origin "$tag" | grep -q "$tag"; then
            echo "Tag already exists on origin: $tag"
            exit 0
          fi
          git push "https://x-access-token:${GH_APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$tag"
          echo "Published Go module tag: $tag"
