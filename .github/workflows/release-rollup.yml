name: Release Rollup

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      days:
        description: "Window (days) to include in rollup"
        required: false
        type: string
        default: "7"

permissions:
  contents: write

jobs:
  weekly-rollup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create rollup release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ROLLUP_DAYS: ${{ inputs.days || '7' }}
        run: pnpm run release:weekly-rollup
