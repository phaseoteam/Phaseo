name: Watchers

on:
    schedule:
        - cron: "*/30 * * * *"

permissions:
    contents: read

jobs:
    watcher:
        name: ${{ matrix.name }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: Web watcher
                      watcher: web
                      script: ../../scripts/watchers/web-watcher.ts
                    - name: YouTube watcher
                      watcher: youtube
                      script: ../../scripts/watchers/youtube-watcher.ts

        env:
            NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

            - name: Setup pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
              with:
                  version: 10.33.0
                  run_install: false
            - name: Setup Node 22
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
              with:
                  node-version: "22"

            - name: Restore lockfile (guard setup-node cache mutation)
              run: git checkout -- pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run watcher (${{ matrix.watcher }})
              env:
                  WEB_WATCHER_PER_SITEMAP_LIMIT: ${{ matrix.watcher == 'web' && secrets.WEB_WATCHER_PER_SITEMAP_LIMIT || '' }}
                  YT_API_KEY: ${{ matrix.watcher == 'youtube' && secrets.YT_API_KEY || '' }}
              run: cd apps/web && pnpm exec tsx ${{ matrix.script }}

