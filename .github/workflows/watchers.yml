name: Watchers

on:
    schedule:
        - cron: "*/30 * * * *"

permissions:
    contents: read

jobs:
    watcher:
        name: ${{ matrix.name }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: Web watcher
                      watcher: web
                      script: ../../scripts/watchers/web-watcher.ts
                    - name: YouTube watcher
                      watcher: youtube
                      script: ../../scripts/watchers/youtube-watcher.ts

        env:
            NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Setup pnpm
              uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288
              with:
                  version: 10.33.0
                  run_install: false
            - name: Setup Node 20
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
              with:
                  node-version: "20"

            - name: Restore lockfile (guard setup-node cache mutation)
              run: git checkout -- pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run watcher (${{ matrix.watcher }})
              env:
                  WEB_WATCHER_PER_SITEMAP_LIMIT: ${{ matrix.watcher == 'web' && secrets.WEB_WATCHER_PER_SITEMAP_LIMIT || '' }}
                  YT_API_KEY: ${{ matrix.watcher == 'youtube' && secrets.YT_API_KEY || '' }}
              run: cd apps/web && pnpm exec tsx ${{ matrix.script }}

