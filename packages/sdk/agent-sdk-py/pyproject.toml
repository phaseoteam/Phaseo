[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-stats-agent-sdk"
version = "0.1.0"
description = "Python agent SDK for building agentic applications on top of AI Stats Gateway"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "ai-stats-py-sdk",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
